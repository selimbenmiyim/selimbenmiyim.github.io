<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>Lattem Stack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

#app{position:fixed;inset:0;display:flex;flex-direction:column}

#three-canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block;z-index:0;touch-action:none}

#hdr{
  position:relative;z-index:10;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:2px solid rgba(232,228,221,.9);
  background:rgba(250,250,248,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
body.dark #hdr{border-bottom-color:rgba(46,45,42,.9);background:rgba(17,17,16,.85)}

.logo-sm{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;letter-spacing:.06em;
  background:linear-gradient(135deg,#7b7b7b,#9f9f9f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-family:'DM Mono',monospace;font-size:11px;color:#8a8a8a;letter-spacing:.06em;text-align:center;margin-top:3px}

.btn-ic{
  width:40px;height:40px;border-radius:12px;
  background:rgba(255,255,255,.8);border:2px solid #e8e4dd;color:#2d2d2a;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;font-weight:600;font-family:inherit;flex-shrink:0;
  transition:background .15s,border-color .15s,transform .1s;backdrop-filter:blur(4px)}
.btn-ic:hover{background:#fff;border-color:#7c64d8}
.btn-ic:active{transform:scale(.90)}
body.dark .btn-ic{background:rgba(30,29,27,.8);border-color:#2e2d2a;color:#e8e4dd}
body.dark .btn-ic:hover{border-color:#7c64d8}

#stats{
  position:relative;z-index:10;width:100%;
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:10px 16px 6px}

.stat{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(255,255,255,.75);border:2px solid rgba(232,228,221,.8);border-radius:14px;
  padding:9px 22px;min-width:86px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.stat-n{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:#5b8fd9}
.stat-l{font-size:10px;color:#8a8a8a;letter-spacing:.09em;text-transform:uppercase;font-weight:600}
body.dark .stat{background:rgba(30,29,27,.75);border-color:rgba(46,45,42,.8)}

/* ── Hint ── */
#hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'DM Mono',monospace;font-size:11px;color:#8a8a8a;letter-spacing:.07em;
  background:rgba(255,255,255,.75);border:1.5px solid rgba(232,228,221,.8);
  border-radius:20px;padding:7px 16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;transition:opacity .4s,transform .4s;white-space:nowrap}
body.dark #hint{background:rgba(30,29,27,.75);border-color:rgba(46,45,42,.8);color:#5a5a5a}
#hint.hidden{opacity:0;transform:translateX(-50%) translateY(8px)}

#perfect-label{
  position:fixed;top:38%;left:50%;transform:translateX(-50%) scale(.4);
  z-index:20;pointer-events:none;
  font-family:'DM Sans',sans-serif;font-size:clamp(32px,7vw,56px);font-weight:700;
  letter-spacing:-.5px;
  background:linear-gradient(135deg,#7c64d8,#42b8a8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(124,100,216,.55));
  opacity:0;transition:none;white-space:nowrap}
#perfect-label.fire{
  animation:perfectPop .7s cubic-bezier(.22,1.6,.5,1) forwards}
@keyframes perfectPop{
  0%  {opacity:0;transform:translateX(-50%) scale(.3) translateY(20px)}
  25% {opacity:1;transform:translateX(-50%) scale(1.08) translateY(-4px)}
  55% {opacity:1;transform:translateX(-50%) scale(1) translateY(0)}
  85% {opacity:1;transform:translateX(-50%) scale(1) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) scale(.9) translateY(-16px)}
}

#combo-badge{
  position:fixed;top:calc(38% + clamp(40px,9vw,68px));left:50%;
  transform:translateX(-50%) scale(.5);
  z-index:20;pointer-events:none;
  font-family:'DM Mono',monospace;font-size:clamp(13px,3.5vw,18px);font-weight:700;
  color:#d4a555;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(212,165,85,.14);border:2px solid rgba(212,165,85,.4);
  border-radius:30px;padding:4px 16px;
  opacity:0;white-space:nowrap}
#combo-badge.show{animation:comboPop .65s cubic-bezier(.22,1.6,.5,1) forwards}
@keyframes comboPop{
  0%  {opacity:0;transform:translateX(-50%) scale(.5)}
  30% {opacity:1;transform:translateX(-50%) scale(1.1)}
  55% {opacity:1;transform:translateX(-50%) scale(1)}
  85% {opacity:1;transform:translateX(-50%) scale(1)}
  100%{opacity:0;transform:translateX(-50%) scale(.85)}
}

#flash{
  position:fixed;inset:0;z-index:8;pointer-events:none;
  background:rgba(255,255,255,.22);opacity:0}
body.dark #flash{background:rgba(255,255,255,.10)}
#flash.pop{animation:flashPop .35s ease forwards}
@keyframes flashPop{0%{opacity:1}100%{opacity:0}}

#confetti-canvas{
  position:fixed;inset:0;z-index:19;pointer-events:none;
  width:100%;height:100%}

.overlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(250,250,248,.93);
  opacity:0;pointer-events:none;transform:translateY(-10px);
  transition:opacity .28s,transform .28s}
body.dark .overlay{background:rgba(17,17,16,.93)}
.overlay.show{opacity:1;pointer-events:auto;transform:none}

.ov-card{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;padding:36px 32px;text-align:center;max-width:320px;width:90%}

@keyframes epop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:none;opacity:1}}
.ov-emoji{font-size:56px;line-height:1;animation:epop .55s cubic-bezier(.34,1.56,.64,1) both}
.ov-title{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:#2d2d2a}
body.dark .ov-title{color:#e8e4dd}
.ov-score{font-family:'DM Mono',monospace;font-size:54px;font-weight:700;color:#5b8fd9;line-height:1.1}
.ov-best{font-family:'DM Mono',monospace;font-size:12px;color:#8a8a8a;letter-spacing:.06em;margin-top:-4px}
.ov-sub{font-family:'DM Sans',sans-serif;font-size:14px;color:#8a8a8a;margin-top:2px}
.ov-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}

.btn-primary{
  background:#7c64d8;border:2px solid #7c64d8;color:#fff;
  border-radius:14px;padding:14px 36px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .2s,box-shadow .2s,transform .1s}
.btn-primary:hover{background:#6d5ac2;box-shadow:0 4px 14px rgba(124,100,216,.4)}
.btn-primary:active{transform:scale(.95)}

.btn-danger{
  background:#e8705b;border:2px solid #e8705b;color:#fff;
  border-radius:14px;padding:14px 36px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .2s,box-shadow .2s,transform .1s}
.btn-danger:hover{background:#d4604c;box-shadow:0 4px 14px rgba(232,112,91,.4)}
.btn-danger:active{transform:scale(.95)}

.btn-secondary{
  background:rgba(255,255,255,.7);border:2px solid #e8e4dd;color:#2d2d2a;
  border-radius:12px;padding:12px 24px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:border-color .2s,background .2s,transform .1s}
.btn-secondary:hover{border-color:#7c64d8;background:#fff}
.btn-secondary:active{transform:scale(.95)}
body.dark .btn-secondary{background:rgba(30,29,27,.7);border-color:#2e2d2a;color:#e8e4dd}
body.dark .btn-secondary:hover{border-color:#7c64d8}

@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
.score-pop{animation:scorePop .28s cubic-bezier(.34,1.56,.64,1)}

@media(max-width:480px){
  #hdr{padding:10px 12px}
  .logo-sm{font-size:17px}
  .btn-ic{width:36px;height:36px;font-size:16px;border-radius:10px}
  #stats{gap:8px;padding:8px 12px 4px}
  .stat{padding:7px 14px;min-width:74px;border-radius:10px}
  .stat-n{font-size:18px}
  #hint{font-size:10px;padding:6px 13px;bottom:14px}
  .ov-card{padding:28px 20px;gap:10px}
  .ov-emoji{font-size:44px}
  .ov-title{font-size:21px}
  .ov-score{font-size:46px}
  .btn-primary,.btn-danger{padding:12px 28px;font-size:14px}
  .btn-secondary{padding:10px 18px;font-size:13px}
}
@media(max-width:360px){
  .btn-ic{width:32px;height:32px;font-size:14px}
  .stat-n{font-size:15px}
  .ov-score{font-size:38px}
}
</style>
</head>
<body>

<div id="app">
  <canvas id="three-canvas"></canvas>

  <div id="hdr">
    <button class="btn-ic" id="btn-back">←</button>
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="logo-sm">LATTEM</div>
      <div class="hdr-sub">Stack</div>
    </div>
    <button class="btn-ic" id="btn-new">↺</button>
  </div>

  <div id="stats">
    <div class="stat"><span class="stat-n" id="el-score">0</span><span class="stat-l">Score</span></div>
    <div class="stat"><span class="stat-n" id="el-best">0</span><span class="stat-l">Best</span></div>
  </div>
</div>

<div id="hint">Tap or press Space to drop</div>
<div id="perfect-label">PERFECT!</div>
<div id="combo-badge">COMBO x2</div>
<div id="flash"></div>
<canvas id="confetti-canvas"></canvas>

<!-- Game Over overlay -->
<div class="overlay" id="overlay-gameover">
  <div class="ov-card">
    <div class="ov-emoji" id="ov-emoji">😫</div>
    <div class="ov-title" id="ov-title">Game Over</div>
    <div class="ov-score" id="ov-score">0</div>
    <div class="ov-best"  id="ov-best">Best: 0</div>
    <div class="ov-sub"   id="ov-sub">The block fell off!</div>
    <div class="ov-actions">
      <button class="btn-primary"   id="btn-again">Play Again</button>
      <button class="btn-secondary" id="btn-share">Share</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-confirm">
  <div class="ov-card">
    <div class="ov-emoji">⚠️</div>
    <div class="ov-title">Reset Game?</div>
    <div class="ov-sub">Your current progress will be lost. Are you sure?</div>
    <div class="ov-actions">
      <button class="btn-danger"    id="btn-confirm-yes">Yes, Reset</button>
      <button class="btn-secondary" id="btn-confirm-no">Cancel</button>
    </div>
  </div>
</div>

<script>

const BEST_KEY    = 'lattemStackBest';
const BLOCK_W     = 3.0;
const BLOCK_D     = 3.0;
const BLOCK_H     = 0.32;
const BLOCK_GAP   = 0.04;
const PERFECT_THR = 0.12;
const PERFECT_GRW = 0.18;
const BASE_SPD    = 2.2;
const SPD_INC     = 0.06;
const MAX_SPD     = 7.5;
const GRAVITY_3D  = 14;
const CAM_OFFSET_Y= 5.5;
const CAM_Z       = 9;

const PALETTE = [
  0x5b8fd9,0x7c64d8,0x42b8a8,
  0xd4a555,0xd97ba8,0x4bb996,0xe8705b
];
const PALETTE_HEX = [
  '#5b8fd9','#7c64d8','#42b8a8',
  '#d4a555','#d97ba8','#4bb996','#e8705b'
];

const canvas3  = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({canvas:canvas3,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputEncoding    = THREE.sRGBEncoding;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42,1,0.1,200);
camera.position.set(1.5,8,CAM_Z);
camera.lookAt(0,0,0);

const ambLight = new THREE.AmbientLight(0xffffff,0.55);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff,0.9);
dirLight.position.set(5,14,8);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);
dirLight.shadow.camera.near=1;dirLight.shadow.camera.far=60;
dirLight.shadow.camera.left=dirLight.shadow.camera.bottom=-12;
dirLight.shadow.camera.right=dirLight.shadow.camera.top=12;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xb0c4ff,0.28);
fillLight.position.set(-4,6,-4);
scene.add(fillLight);

let score=0, best=parseInt(localStorage.getItem(BEST_KEY)||'0',10);
let active=false, raf=null, lastTs=null;
let layers=[], fallingChunks=[], perfectParticles=[];
let moverMesh=null, mover={};
let camTargetY=6, moveAxis='x';
let comboCount=0; 

function layerY(i){ return i*(BLOCK_H+BLOCK_GAP)+BLOCK_H/2; }

function makeMat(ci,emissive=0){
  return new THREE.MeshLambertMaterial({
    color:PALETTE[ci%PALETTE.length],
    emissive:PALETTE[ci%PALETTE.length],
    emissiveIntensity:emissive
  });
}
function makeBlock(w,d,h,ci,em=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),makeMat(ci,em));
  m.castShadow=true; m.receiveShadow=true;
  return m;
}

function initGame(){
  layers.forEach(l=>l.mesh&&scene.remove(l.mesh));
  if(moverMesh){scene.remove(moverMesh);moverMesh=null;}
  fallingChunks.forEach(c=>scene.remove(c.mesh));
  fallingChunks=[];
  perfectParticles.forEach(p=>scene.remove(p.mesh));
  perfectParticles=[];
  layers=[]; score=0; moveAxis='x'; lastTs=null; comboCount=0;

  const base=makeBlock(BLOCK_W,BLOCK_D,BLOCK_H,0,0.04);
  base.position.set(0,layerY(0),0);
  scene.add(base);
  layers.push({mesh:base,x:0,z:0,w:BLOCK_W,d:BLOCK_D,colorIdx:0});

  camTargetY=layerY(0)+CAM_OFFSET_Y;
  camera.position.y=camTargetY;
  camera.lookAt(0,layerY(0),0);

  resetMover();
  updateHUD();
  document.getElementById('overlay-gameover').classList.remove('show');
  document.getElementById('overlay-confirm').classList.remove('show');
  document.getElementById('hint').classList.remove('hidden');
}

function resetMover(){
  if(moverMesh){scene.remove(moverMesh);moverMesh=null;}
  const top=layers[layers.length-1];
  const ci=layers.length%PALETTE.length;
  const spd=Math.min(BASE_SPD+(layers.length-1)*SPD_INC,MAX_SPD);
  const ni=layers.length;
  const yPos=layerY(ni);
  moveAxis=(layers.length%2===0)?'x':'z';

  moverMesh=makeBlock(top.w,top.d,BLOCK_H,ci,0.07);
  moverMesh.position.y=yPos;
  if(moveAxis==='x'){moverMesh.position.x=-BLOCK_W*3;moverMesh.position.z=top.z;}
  else              {moverMesh.position.x=top.x;moverMesh.position.z=-BLOCK_D*3;}
  scene.add(moverMesh);
  mover={x:moverMesh.position.x,z:moverMesh.position.z,w:top.w,d:top.d,dir:1,speed:spd,colorIdx:ci};
}
function drop(){
  if(!active) return;
  document.getElementById('hint').classList.add('hidden');

  const top=layers[layers.length-1];
  let newX,newZ,newW,newD,isPerfect=false;

  if(moveAxis==='x'){
    const mL=mover.x-mover.w/2, mR=mover.x+mover.w/2;
    const tL=top.x-top.w/2,     tR=top.x+top.w/2;
    const oL=Math.max(mL,tL),    oR=Math.min(mR,tR);
    const ov=oR-oL;
    if(ov<=0.01){comboCount=0;gameOver();return;}
    if(Math.abs(mover.x-top.x)<=PERFECT_THR){
      isPerfect=true;
      newW=Math.min(top.w+PERFECT_GRW,BLOCK_W*1.4); newX=top.x;
    } else {
      newW=ov; newX=(oL+oR)/2;
      const yPos=layerY(layers.length);
      if(mL<tL) spawnChunk((mL+tL)/2,yPos,mover.z,tL-mL,mover.d,mover.colorIdx);
      if(mR>tR) spawnChunk((tR+mR)/2,yPos,mover.z,mR-tR,mover.d,mover.colorIdx);
    }
    newZ=top.z; newD=top.d;
  } else {
    const mF=mover.z-mover.d/2, mB=mover.z+mover.d/2;
    const tF=top.z-top.d/2,     tB=top.z+top.d/2;
    const oF=Math.max(mF,tF),    oB=Math.min(mB,tB);
    const ov=oB-oF;
    if(ov<=0.01){comboCount=0;gameOver();return;}
    if(Math.abs(mover.z-top.z)<=PERFECT_THR){
      isPerfect=true;
      newD=Math.min(top.d+PERFECT_GRW*0.6,BLOCK_D*1.4); newZ=top.z;
    } else {
      newD=ov; newZ=(oF+oB)/2;
      const yPos=layerY(layers.length);
      if(mF<tF) spawnChunk(mover.x,yPos,(mF+tF)/2,mover.w,tF-mF,mover.colorIdx);
      if(mB>tB) spawnChunk(mover.x,yPos,(tB+mB)/2,mover.w,mB-tB,mover.colorIdx);
    }
    newX=top.x; newW=top.w;
  }

  scene.remove(moverMesh); moverMesh=null;
  const ni=layers.length;
  const nm=makeBlock(newW,newD,BLOCK_H,mover.colorIdx,isPerfect?0.14:0.04);
  nm.position.set(newX,layerY(ni),newZ);
  scene.add(nm);
  layers.push({mesh:nm,x:newX,z:newZ,w:newW,d:newD,colorIdx:mover.colorIdx});

  score++;
  if(score>best){best=score;localStorage.setItem(BEST_KEY,best);}
  updateHUD(true);
  camTargetY=layerY(ni)+CAM_OFFSET_Y;

  if(isPerfect){
    comboCount++;
    triggerPerfect(newX,layerY(ni),newZ,mover.colorIdx,comboCount);
  } else {
    comboCount=0;
  }

  resetMover();
}
function triggerPerfect(bx,by,bz,ci,combo){
  // 1. Ekran flash
  const fl=document.getElementById('flash');
  fl.classList.remove('pop');
  void fl.offsetWidth;
  fl.classList.add('pop');
  const lbl=document.getElementById('perfect-label');
  lbl.classList.remove('fire');
  void lbl.offsetWidth;
  lbl.textContent = combo>=3 ? '🔥 PERFECT!' : 'PERFECT!';
  lbl.classList.add('fire');

  if(combo>=2){
    const badge=document.getElementById('combo-badge');
    badge.textContent=`COMBO ×${combo}`;
    badge.classList.remove('show');
    void badge.offsetWidth;
    badge.classList.add('show');
  }

  spawn3DParticles(bx,by,bz,ci);

  if(combo>=3) spawnConfetti();
}

function spawn3DParticles(cx,cy,cz,ci){
  const count=18;
  for(let i=0;i<count;i++){
    const sz=0.08+Math.random()*0.14;
    const geo=new THREE.BoxGeometry(sz,sz,sz);
    // Renk varyasyonu: aynı palet içinde komşu renkler
    const pci=(ci+Math.floor(Math.random()*3))%PALETTE.length;
    const mat=new THREE.MeshLambertMaterial({
      color:PALETTE[pci],
      emissive:PALETTE[pci],
      emissiveIntensity:0.3,
      transparent:true,opacity:1
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(cx,cy,cz);
    const theta=Math.random()*Math.PI*2;
    const phi  =Math.random()*Math.PI;
    const spd  =2.5+Math.random()*4;
    const vx=Math.sin(phi)*Math.cos(theta)*spd;
    const vy=Math.abs(Math.cos(phi))*spd*0.8+1.5;
    const vz=Math.sin(phi)*Math.sin(theta)*spd;
    const rx=(Math.random()-.5)*8;
    const ry=(Math.random()-.5)*8;
    const rz=(Math.random()-.5)*8;
    scene.add(mesh);
    perfectParticles.push({mesh,vx,vy,vz,rx,ry,rz,life:1,decay:0.85+Math.random()*0.4});
  }
}

function spawnChunk(cx,cy,cz,w,d,ci){
  const mesh=makeBlock(Math.max(w,0.05),Math.max(d,0.05),BLOCK_H,ci,0);
  mesh.position.set(cx,cy,cz);
  scene.add(mesh);
  fallingChunks.push({mesh,vy:0,life:1});
}

const cfc=document.getElementById('confetti-canvas');
const cfctx=cfc.getContext('2d');
let confettiPieces=[];

function spawnConfetti(){
  cfc.width=window.innerWidth; cfc.height=window.innerHeight;
  const cols=['#7c64d8','#42b8a8','#d4a555','#d97ba8','#4bb996','#e8705b','#5b8fd9'];
  for(let i=0;i<70;i++){
    confettiPieces.push({
      x:Math.random()*cfc.width,
      y:-10-Math.random()*40,
      w:6+Math.random()*8,
      h:4+Math.random()*6,
      r:Math.random()*Math.PI*2,
      dr:(Math.random()-.5)*0.18,
      vy:3+Math.random()*4,
      vx:(Math.random()-.5)*2.5,
      col:cols[Math.floor(Math.random()*cols.length)],
      alpha:1
    });
  }
  if(!cfRaf) cfRaf=requestAnimationFrame(confettiLoop);
}

let cfRaf=null;
function confettiLoop(){
  cfctx.clearRect(0,0,cfc.width,cfc.height);
  confettiPieces.forEach(p=>{
    p.y+=p.vy; p.x+=p.vx; p.r+=p.dr; p.alpha-=0.008;
    cfctx.save();
    cfctx.globalAlpha=Math.max(0,p.alpha);
    cfctx.translate(p.x,p.y);
    cfctx.rotate(p.r);
    cfctx.fillStyle=p.col;
    cfctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cfctx.restore();
  });
  confettiPieces=confettiPieces.filter(p=>p.alpha>0&&p.y<cfc.height+20);
  if(confettiPieces.length>0) cfRaf=requestAnimationFrame(confettiLoop);
  else{cfRaf=null;cfctx.clearRect(0,0,cfc.width,cfc.height);}
}

function gameOver(){
  active=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(score>best){best=score;localStorage.setItem(BEST_KEY,best);}

  const great=score>=20,good=score>=10;
  document.getElementById('ov-emoji').textContent=great?'🏆':good?'👏':'💥';
  document.getElementById('ov-title').textContent=great?'Incredible!':good?'Nice stack!':'Game Over';
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-best').textContent='Best: '+best;
  document.getElementById('ov-sub').textContent=score===0
    ?'The block fell right off!'
    :`You stacked ${score} block${score===1?'':'s'}`;
  document.getElementById('overlay-gameover').classList.add('show');
}

function updateHUD(pop=false){
  const el=document.getElementById('el-score');
  el.textContent=score;
  document.getElementById('el-best').textContent=best;
  if(pop){
    el.classList.remove('score-pop');
    void el.offsetWidth;
    el.classList.add('score-pop');
    setTimeout(()=>el.classList.remove('score-pop'),300);
  }
}

function updateBg(){
  const dark=document.body.classList.contains('dark');
  renderer.setClearColor(dark?0x111110:0xf0eef8,1);
  scene.fog=new THREE.Fog(dark?0x111110:0xeeeaf8,18,45);
}
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  cfc.width=w; cfc.height=h;
}

function loop(ts){
  if(!active){raf=null;return;}
  raf=requestAnimationFrame(loop);
  const dt=lastTs?Math.min((ts-lastTs)/1000,0.05):0.016;
  lastTs=ts;

  camera.position.y+=(camTargetY-camera.position.y)*Math.min(dt*5,1);
  camera.lookAt(0,camTargetY-CAM_OFFSET_Y+BLOCK_H,0);

  if(moverMesh){
    if(moveAxis==='x'){
      mover.x+=mover.dir*mover.speed*dt;
      if(mover.x>BLOCK_W*2.2) mover.dir=-1;
      if(mover.x<-BLOCK_W*2.2) mover.dir=1;
      moverMesh.position.x=mover.x;
    } else {
      mover.z+=mover.dir*mover.speed*dt;
      if(mover.z>BLOCK_D*2.2) mover.dir=-1;
      if(mover.z<-BLOCK_D*2.2) mover.dir=1;
      moverMesh.position.z=mover.z;
    }
  }

  for(let i=fallingChunks.length-1;i>=0;i--){
    const c=fallingChunks[i];
    c.vy+=GRAVITY_3D*dt;
    c.mesh.position.y-=c.vy*dt;
    c.life-=dt*1.1;
    c.mesh.material.opacity=Math.max(0,c.life);
    c.mesh.material.transparent=true;
    c.mesh.rotation.x+=dt*1.8;
    c.mesh.rotation.z+=dt*1.2;
    if(c.life<=0){scene.remove(c.mesh);fallingChunks.splice(i,1);}
  }

  for(let i=perfectParticles.length-1;i>=0;i--){
    const p=perfectParticles[i];
    p.vy-=GRAVITY_3D*1.1*dt;
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.y+=p.vy*dt;
    p.mesh.position.z+=p.vz*dt;
    p.mesh.rotation.x+=p.rx*dt;
    p.mesh.rotation.y+=p.ry*dt;
    p.mesh.rotation.z+=p.rz*dt;
    p.life-=dt*p.decay;
    p.mesh.material.opacity=Math.max(0,p.life);
    p.mesh.material.transparent=true;
    if(p.life<=0){scene.remove(p.mesh);perfectParticles.splice(i,1);}
  }

  renderer.render(scene,camera);
}

function startGame(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  updateBg(); resize(); initGame();
  active=true; lastTs=null;
  raf=requestAnimationFrame(loop);
}

canvas3.addEventListener('pointerdown',e=>{e.preventDefault();if(active)drop();});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.key===' '){e.preventDefault();if(active)drop();}
});

// Geri butonu
document.getElementById('btn-back').onclick=()=>{
  active=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  window.history.back();
};

document.getElementById('btn-new').onclick=()=>{
  if(!active||score===0){startGame();return;}
  document.getElementById('overlay-confirm').classList.add('show');
};


document.getElementById('btn-confirm-yes').onclick=()=>{
  document.getElementById('overlay-confirm').classList.remove('show');
  startGame();
};
document.getElementById('btn-confirm-no').onclick=()=>{
  document.getElementById('overlay-confirm').classList.remove('show');
};

document.getElementById('btn-again').onclick=()=>startGame();
document.getElementById('btn-share').onclick=()=>{
  const text=`I stacked ${score} block${score===1?'':'s'} on Lattem Stack!! Can you beat me?\n${window.location.href}`;
  if(navigator.share)navigator.share({text}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(text);
};

const savedDark=localStorage.getItem('lattem-dark');
if(savedDark==='1')document.body.classList.add('dark');

let resizeT;
window.addEventListener('resize',()=>{
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{resize();updateBg();},120);
});

resize();
updateBg();
startGame();
</script>
